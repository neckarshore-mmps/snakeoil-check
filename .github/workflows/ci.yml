name: CI

on:
  push:
    # bob/fable-pilot-p3p1: TEMPORARY pilot-only addition. The pilot PR #45 is
    # structurally CONFLICTING vs main (base fcbb9c1 predates merged #44, same
    # paths), so GitHub builds no merge ref and pull_request runs never fire.
    # push-event runs use this branch's workflow file — branch is deleted
    # after the pilot, never merged.
    branches: [main, bob/fable-pilot-p3p1]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
      POSTGRES_URL_NON_POOLING: ${{ secrets.DATABASE_URL_TEST }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test
      - name: Disposable-blocklist freshness (warning-only)
        run: pnpm validate:disposable-list
      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
      POSTGRES_URL_NON_POOLING: ${{ secrets.DATABASE_URL_TEST }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
